<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EAA Insiders Book Club</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #2b604e;
    --green-light: #3a7d66;
    --green-dark: #1e4538;
    --cream: #fffcf5;
    --cream-dark: #f5f0e8;
    --text: #2a2a2a;
    --text-light: #6b6b6b;
    --shadow: rgba(43, 96, 78, 0.08);
    --shadow-hover: rgba(43, 96, 78, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  header {
    text-align: center;
    padding: 80px 24px 60px;
    position: relative;
  }

  header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(180deg, rgba(43,96,78,0.03) 0%, transparent 100%);
    pointer-events: none;
  }

  .header-label {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--green);
    margin-bottom: 16px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards;
  }

  .header-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(48px, 8vw, 80px);
    font-weight: 400;
    color: var(--green);
    line-height: 1.05;
    letter-spacing: -1px;
    margin-bottom: 8px;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.1s forwards;
  }

  .header-subtitle {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 5vw, 44px);
    font-weight: 400;
    font-style: italic;
    color: var(--green-light);
    margin-bottom: 32px;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.2s forwards;
  }

  .header-line {
    width: 60px;
    height: 1px;
    background: var(--green);
    margin: 0 auto 24px;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.3s forwards;
  }

  .header-desc {
    font-size: 14px;
    color: var(--text-light);
    max-width: 480px;
    margin: 0 auto;
    line-height: 1.7;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.4s forwards;
  }

  .filters {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 8px;
    padding: 0 24px 48px;
    max-width: 800px;
    margin: 0 auto;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.5s forwards;
  }

  .filter-btn {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 10px 20px;
    border: 1px solid rgba(43,96,78,0.2);
    background: transparent;
    color: var(--green);
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .filter-btn:hover { background: rgba(43,96,78,0.05); border-color: var(--green); }
  .filter-btn.active { background: var(--green); color: var(--cream); border-color: var(--green); }

  .books-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 32px;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 32px 80px;
  }

  .book-card {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 20px var(--shadow);
    transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    opacity: 0;
    transform: translateY(20px);
  }

  .book-card.visible { opacity: 1; transform: translateY(0); }
  .book-card:hover { transform: translateY(-6px); box-shadow: 0 12px 40px var(--shadow-hover); }

  .book-cover-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 2/3;
    overflow: hidden;
    background: var(--cream-dark);
  }

  .book-cover-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.6s ease;
  }

  .book-card:hover .book-cover-wrap img { transform: scale(1.03); }

  .cover-placeholder {
    width: 100%;
    height: 100%;
    background: linear-gradient(160deg, #2b604e 0%, #1e4538 40%, #173a2e 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 28px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .cover-placeholder::before {
    content: '';
    position: absolute;
    top: 16px; left: 16px; right: 16px; bottom: 16px;
    border: 1px solid rgba(255,252,245,0.12);
    pointer-events: none;
  }

  .cover-placeholder::after {
    content: '';
    position: absolute;
    top: 22px; left: 22px; right: 22px; bottom: 22px;
    border: 0.5px solid rgba(255,252,245,0.06);
    pointer-events: none;
  }

  .cover-placeholder .ph-line-top,
  .cover-placeholder .ph-line-bottom {
    width: 40px;
    height: 1px;
    background: rgba(255,252,245,0.25);
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
  }

  .cover-placeholder .ph-line-top { top: 36px; }
  .cover-placeholder .ph-line-bottom { bottom: 36px; }

  .cover-placeholder .ph-title {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight: 600;
    color: var(--cream);
    line-height: 1.25;
    margin-bottom: 16px;
    z-index: 1;
    letter-spacing: 0.5px;
  }

  .cover-placeholder .ph-divider {
    width: 24px;
    height: 1px;
    background: rgba(255,252,245,0.35);
    margin-bottom: 16px;
    z-index: 1;
  }

  .cover-placeholder .ph-author {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: rgba(255,252,245,0.5);
    z-index: 1;
  }

  .book-info { padding: 20px; }

  .book-genre {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--green);
    margin-bottom: 8px;
  }

  .book-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
    margin-bottom: 4px;
  }

  .book-author {
    font-size: 14px;
    color: var(--text-light);
    margin-bottom: 12px;
  }

  .book-note {
    font-size: 13px;
    color: var(--text-light);
    line-height: 1.6;
    font-style: italic;
    margin-bottom: 16px;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .book-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 12px;
    border-top: 1px solid rgba(0,0,0,0.05);
  }

  .book-rec {
    font-size: 12px;
    color: var(--text-light);
    line-height: 1.4;
  }

  .book-rec strong { color: var(--green); font-weight: 600; }

  .like-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: var(--text-light);
    padding: 6px 12px;
    border-radius: 100px;
    transition: all 0.3s ease;
    flex-shrink: 0;
  }

  .like-btn:hover { background: rgba(43,96,78,0.05); }
  .like-btn.liked { color: #c0392b; }

  .heart {
    font-size: 16px;
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    display: inline-block;
  }

  .like-btn.liked .heart { animation: heartPop 0.4s ease; }

  .stats-bar {
    text-align: center;
    padding: 40px 24px;
    border-top: 1px solid rgba(43,96,78,0.08);
  }

  .stats-bar p {
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-light);
  }

  .stats-bar span { color: var(--green); font-weight: 600; }

  footer {
    text-align: center;
    padding: 32px 24px 48px;
    font-size: 12px;
    color: var(--text-light);
    letter-spacing: 1px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes heartPop {
    0% { transform: scale(1); }
    50% { transform: scale(1.4); }
    100% { transform: scale(1.2); }
  }

  .empty-state {
    text-align: center;
    padding: 80px 24px;
    grid-column: 1 / -1;
  }

  .empty-state p {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--text-light);
    font-style: italic;
  }

  @media (max-width: 640px) {
    header { padding: 60px 20px 40px; }
    .books-grid {
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
      padding: 0 16px 60px;
    }
    .filters { padding: 0 16px 32px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-label">EAA Insiders</div>
  <h1 class="header-title">Book Club</h1>
  <div class="header-subtitle">Recommended Reading</div>
  <div class="header-line"></div>
  <p class="header-desc">Books recommended by members of the EAA Insiders community. Tap the heart on any book you have read or want to read.</p>
</header>

<div class="filters" id="filters"></div>
<div class="books-grid" id="booksGrid"></div>

<div class="stats-bar">
  <p><span id="bookCount">0</span> books recommended by <span id="memberCount">0</span> members</p>
</div>

<footer>EAA Insiders &middot; Book Club</footer>

const STORAGE_KEY = 'eaa-book-likes';

function getLikes() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { return {}; }
}

function saveLikes(likes) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(likes));
}

function toggleLike(idx) {
  const likes = getLikes();
  const key = `book-${idx}`;
  if (likes[key]) { delete likes[key]; }
  else { likes[key] = true; }
  saveLikes(likes);
  renderBooks(currentFilter);
}

function getCoverUrl(book) {
  if (book.coverUrl) return book.coverUrl;
  if (book.isbn) return `https://covers.openlibrary.org/b/isbn/${book.isbn}-L.jpg`;
  return null;
}

let currentFilter = 'All';

function renderFilters() {
  const genres = ['All', ...new Set(BOOKS.map(b => b.genre))].sort((a, b) => {
    if (a === 'All') return -1;
    if (b === 'All') return 1;
    return a.localeCompare(b);
  });

  document.getElementById('filters').innerHTML = genres.map(g =>
    `<button class="filter-btn ${g === currentFilter ? 'active' : ''}" onclick="setFilter('${g}')">${g}</button>`
  ).join('');
}

function setFilter(genre) {
  currentFilter = genre;
  renderFilters();
  renderBooks(genre);
}

function makePlaceholderHTML(title, author) {
  return `<div class="cover-placeholder"><div class="ph-line-top"></div><div class="ph-title">${title}</div><div class="ph-divider"></div><div class="ph-author">${author}</div><div class="ph-line-bottom"></div></div>`;
}

function handleCoverError(el, title, author) {
  el.parentElement.innerHTML = makePlaceholderHTML(title, author);
}

function handleCoverLoad(el, title, author) {
  // Open Library returns a tiny 1x1 pixel or very small image for missing covers
  if (el.naturalWidth < 50 || el.naturalHeight < 50) {
    el.parentElement.innerHTML = makePlaceholderHTML(title, author);
  }
}

function renderBooks(filter) {
  const grid = document.getElementById('booksGrid');
  const likes = getLikes();
  const filtered = filter === 'All' ? BOOKS : BOOKS.filter(b => b.genre === filter);

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state"><p>No books in this category yet.</p></div>';
    return;
  }

  grid.innerHTML = filtered.map((book, i) => {
    const idx = BOOKS.indexOf(book);
    const liked = likes[`book-${idx}`];
    const recByStr = book.recommendedBy.map(n => `<strong>${n}</strong>`).join(' &amp; ');
    const coverUrl = getCoverUrl(book);
    const safeTitle = book.title.replace(/'/g, "\\'");
    const safeAuthor = book.author.replace(/'/g, "\\'");

    const coverHtml = coverUrl
      ? `<img src="${coverUrl}" alt="${book.title}" loading="lazy" onload="handleCoverLoad(this,'${safeTitle}','${safeAuthor}')" onerror="handleCoverError(this,'${safeTitle}','${safeAuthor}')">`
      : makePlaceholderHTML(book.title, book.author);

    return `
      <div class="book-card">
        <div class="book-cover-wrap">${coverHtml}</div>
        <div class="book-info">
          <div class="book-genre">${book.genre}</div>
          <div class="book-title">${book.title}</div>
          <div class="book-author">by ${book.author}</div>
          ${book.note ? `<div class="book-note">"${book.note}"</div>` : ''}
          <div class="book-footer">
            <div class="book-rec">Rec'd by ${recByStr}</div>
            <button class="like-btn ${liked ? 'liked' : ''}" onclick="toggleLike(${idx})">
              <span class="heart">${liked ? '♥' : '♡'}</span>
            </button>
          </div>
        </div>
      </div>
    `;
  }).join('');

  requestAnimationFrame(() => {
    document.querySelectorAll('.book-card').forEach((card, i) => {
      setTimeout(() => card.classList.add('visible'), i * 60);
    });
  });
}

// Stats
document.getElementById('bookCount').textContent = BOOKS.length;
const allMembers = new Set();
BOOKS.forEach(b => b.recommendedBy.forEach(m => allMembers.add(m)));
document.getElementById('memberCount').textContent = allMembers.size;

renderFilters();
renderBooks('All');
</script>
</body>
</html>
